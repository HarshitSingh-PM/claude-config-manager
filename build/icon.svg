<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20"/>
      <feOffset dx="0" dy="12" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Rounded square background — Apple's "squircle" radius ratio (~22% of side) -->
  <rect x="0" y="0" width="1024" height="1024" rx="225" ry="225" fill="url(#bg)"/>
  <!-- Subtle inner highlight -->
  <rect x="0" y="0" width="1024" height="512" rx="225" ry="225" fill="white" fill-opacity="0.08"/>
  <!-- Letter C, monospace-feeling, centered -->
  <text x="512" y="720" text-anchor="middle" font-family="-apple-system, ui-sans-serif, system-ui, sans-serif" font-size="640" font-weight="800" fill="#0a0a0c" filter="url(#shadow)">C</text>
</svg>
